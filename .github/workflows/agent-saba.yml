name: "cad: SA/BA Analysis (reusable)"

# Station 1 — Systems/Business analysis. Reads the issue + the app codebase,
# posts a structured analysis comment, marks the card done-in-silo (pull system).
#
# Reusable (workflow_call). Called by a thin caller in the app repo (e.g.
# cad-console/.github/workflows/agent-saba.yml). Because this runs as a reusable
# workflow, `github.repository` is the CALLER's repo (the app) — so the default
# checkout, issue comments, and board ops all target the app, exactly right.
# The framework's prompts + scripts live in THIS repo (cad) and are pulled in via
# a second checkout into ./engine.

on:
  workflow_call:
    inputs:
      issue_number:
        description: "Issue number to analyze (in the app repo)"
        required: true
        type: string
      model:
        description: "Model id; caller passes vars.MODEL_SABA"
        required: false
        type: string
        default: ""
      base_branch:
        description: "Default branch of the app repo (for dispatcher nudge)"
        required: false
        type: string
        default: "main"
      engine_ref:
        description: "Ref of the cad engine repo to use"
        required: false
        type: string
        default: "main"
    secrets:
      ANTHROPIC_API_KEY:
        required: true
      PROJECT_PAT:
        required: true
      TELEGRAM_BOT_TOKEN:
        required: false
      TELEGRAM_CHAT_ID:
        required: false

permissions:
  contents: read
  issues: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout app repo (the code being analyzed)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PROJECT_PAT }}

      - name: Checkout engine (cad — prompts + scripts)
        uses: actions/checkout@v4
        with:
          repository: errmakov/cad
          ref: ${{ inputs.engine_ref }}
          path: engine

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Gather issue context
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
        run: |
          chmod +x engine/scripts/get-issue-context.sh
          engine/scripts/get-issue-context.sh "${{ github.repository }}" "${{ inputs.issue_number }}" > /tmp/issue-context.md
          echo "--- Issue Context ---"
          cat /tmp/issue-context.md

      - name: Run SA/BA analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          MODEL="${{ inputs.model }}"; MODEL="${MODEL:-claude-sonnet-4-6}"
          ISSUE_CONTEXT=$(cat /tmp/issue-context.md)
          SABA_PROMPT=$(cat engine/prompts/saba-system.md)

          claude -p "$(cat <<PROMPT
          ${SABA_PROMPT}

          ## Issue to Analyze

          ${ISSUE_CONTEXT}

          ## Codebase

          You have access to the full codebase. Use Read, Glob, and Grep to explore it.
          Start by reading CLAUDE.md for project conventions.
          PROMPT
          )" \
            --allowedTools "Read,Glob,Grep" \
            --model "$MODEL" \
            --max-turns 20 \
            --output-format json \
          | tee /tmp/claude.json | jq -r '.result // empty' > /tmp/analysis-result.md

          echo "--- Analysis Result ---"
          cat /tmp/analysis-result.md

      - name: Report agent spend
        if: always()
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
        run: |
          [ -s /tmp/claude.json ] || exit 0
          chmod +x engine/scripts/agent-cost.sh
          engine/scripts/agent-cost.sh "saba" /tmp/claude.json "${{ github.repository }}" "${{ inputs.issue_number }}"

      - name: Post analysis as issue comment
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
        run: |
          {
            echo "## 🔬 SA/BA Analysis (automated)"
            echo ""
            cat /tmp/analysis-result.md
            echo ""
            echo "---"
            echo "_Generated by cad agent-saba | $(date -u +%Y-%m-%dT%H:%M:%SZ)_"
          } > /tmp/comment-body.md

          gh issue comment "${{ inputs.issue_number }}" \
            --repo "${{ github.repository }}" \
            --body-file /tmp/comment-body.md

      - name: Mark SA/BA done (await pull) + kick dispatcher
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
        run: |
          # Pull system: do NOT push to Dev. Mark done-in-silo; the dispatcher pulls
          # it into Dev only when Dev is under its WIP limit.
          gh api --method POST "repos/${{ github.repository }}/issues/${{ inputs.issue_number }}/labels" -f "labels[]=stage:done" >/dev/null 2>&1 || true
          gh api --method DELETE "repos/${{ github.repository }}/issues/${{ inputs.issue_number }}/labels/stage:doing" >/dev/null 2>&1 || true
          # Nudge the dispatcher (a caller workflow in the app repo) to tick now.
          gh api --method POST "repos/${{ github.repository }}/actions/workflows/dispatcher.yml/dispatches" -f ref=${{ inputs.base_branch }} >/dev/null 2>&1 || true

      - name: Handle failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          chmod +x engine/scripts/notify-telegram.sh || true
          gh api --method POST "repos/${{ github.repository }}/issues/${{ inputs.issue_number }}/labels" -f "labels[]=blocker" -f "labels[]=needs-human" >/dev/null 2>&1 || true
          gh api --method DELETE "repos/${{ github.repository }}/issues/${{ inputs.issue_number }}/labels/stage:doing" >/dev/null 2>&1 || true
          gh issue comment "${{ inputs.issue_number }}" \
            --repo "${{ github.repository }}" \
            --body "⚠️ **SA/BA analysis failed.** Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details." || true
          engine/scripts/notify-telegram.sh "⚠️ SA/BA analysis failed for issue #${{ inputs.issue_number }}. Needs manual attention." || true
