name: "cad: Deploy baseline (Vercel, reusable)"

# Restore production to the clean baseline app. reset-rehearsal force-resets the app's
# base branch to the `baseline` tag, then triggers this to redeploy that clean commit —
# so each rehearsal starts from an identical live app. No board ops, no merges. Reusable.

on:
  workflow_call:
    inputs:
      base_branch:
        required: false
        type: string
        default: "main"
      engine_ref:
        required: false
        type: string
        default: "main"
      production_url:
        required: false
        type: string
        default: ""
    secrets:
      PROJECT_PAT:
        required: true
      VERCEL_TOKEN:
        required: true
      VERCEL_ORG_ID:
        required: true
      VERCEL_PROJECT_ID:
        required: true

permissions:
  contents: read

jobs:
  baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout app at the (reset) base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.base_branch }}
          token: ${{ secrets.PROJECT_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps + Vercel CLI
        run: |
          npm ci
          npm install -g vercel@latest

      - name: Capture SHA
        id: sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build + deploy baseline to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          GIT_SHA: ${{ steps.sha.outputs.sha }}
        run: |
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          GIT_SHA="$GIT_SHA" vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN" | tee /tmp/deploy-url.txt
          echo "::notice::Baseline deployed $(tail -1 /tmp/deploy-url.txt)"

      - name: Smoke test (assert live version == baseline SHA)
        run: |
          URL="${{ inputs.production_url }}"
          if [ -z "$URL" ]; then echo "::warning::No production_url — skipping smoke test"; exit 0; fi
          EXPECT="${{ steps.sha.outputs.sha }}"
          for i in $(seq 1 12); do
            LIVE=$(curl -s "$URL/api/health" --max-time 30 | jq -r '.version // ""')
            [ "$LIVE" = "$EXPECT" ] && { echo "::notice::Baseline live (version ${LIVE})"; exit 0; }
            echo "live=${LIVE:-none} != ${EXPECT} — retry $i/12"; sleep 5
          done
          echo "::error::Baseline deploy did not go live"; exit 1
