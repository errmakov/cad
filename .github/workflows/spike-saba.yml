name: "spike: saba (reusable)"

# SPIKE — validates the two-repo reusable-workflow plumbing for CAD.
# Proves three things, cheaply (no Anthropic API call):
#   1. dispatch-the-caller: cad-console dispatches its thin caller, which `uses:` THIS.
#   2. engine-prompt access: a reusable workflow checks out `cad` and reads prompts/.
#   3. secret inheritance: `secrets: inherit` from the caller carries ANTHROPIC_API_KEY.
# Then it posts a comment back to the caller's issue (proves PAT + cross-repo write).
# Replace with the real agent-saba once the plumbing is green.

on:
  workflow_call:
    inputs:
      issue_number:
        description: "Issue number in the target (app) repo"
        required: true
        type: string
      target_repo:
        description: "owner/name of the app repo being built (the caller)"
        required: true
        type: string
    secrets:
      ANTHROPIC_API_KEY:
        required: true
      PROJECT_PAT:
        required: true

jobs:
  saba:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout target app repo (the caller — the code being built)
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.target_repo }}
          token: ${{ secrets.PROJECT_PAT }}
          path: app

      - name: Checkout engine (cad — prompts + scripts live here)
        uses: actions/checkout@v4
        with:
          repository: errmakov/cad
          path: engine

      - name: "Q2 — prove prompt access from the engine checkout"
        run: |
          echo "::group::engine/prompts/saba-system.md"
          cat engine/prompts/saba-system.md
          echo "::endgroup::"
          test -s engine/prompts/saba-system.md && echo "OK: engine prompt is readable"

      - name: "Q3 — prove secret inheritance (without printing the secret)"
        env:
          KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$KEY" ]; then
            echo "OK: ANTHROPIC_API_KEY present (length ${#KEY})"
          else
            echo "FAIL: ANTHROPIC_API_KEY is empty — secrets: inherit did not carry it"
            exit 1
          fi

      - name: "Q1 — prove cross-repo write back to the caller's issue"
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
        run: |
          gh issue comment "${{ inputs.issue_number }}" \
            --repo "${{ inputs.target_repo }}" \
            --body "✅ **CAD spike green.** A reusable workflow in \`errmakov/cad\` ran via dispatch-the-caller, read the engine prompt, saw the inherited \`ANTHROPIC_API_KEY\`, and reached this issue. The two-repo framework plumbing works."
